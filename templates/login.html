{% extends "base.html" %}

{% block title %}Login — CloudBackup System{% endblock %}

{% block extra_head %}
<style>
  body { background: radial-gradient(ellipse at 20% 50%, #0f3460 0%, #0d0d1a 60%); }

  .auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .auth-card {
    background: linear-gradient(145deg, #16213e, #0f2040);
    border: 1px solid rgba(78,143,255,0.15);
    border-radius: 20px;
    padding: 2.5rem 2.2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 1.8rem;
  }
  .auth-logo .logo-icon {
    font-size: 3rem;
    background: linear-gradient(135deg, #4e8fff, #00c48c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    margin-bottom: 0.4rem;
  }
  .auth-logo h1 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(90deg, #4e8fff, #00c48c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-logo p { color: #64748b; font-size: 0.85rem; margin-top: 0.25rem; }

  .form-label-custom {
    color: #94a3b8;
    font-size: 0.82rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }

  .form-control-custom {
    background: rgba(255,255,255,0.05) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: #e2e8f0 !important;
    border-radius: 10px !important;
    padding: 0.7rem 1rem !important;
    font-size: 0.95rem;
    transition: all 0.25s ease;
  }
  .form-control-custom:focus {
    background: rgba(78,143,255,0.08) !important;
    border-color: #4e8fff !important;
    box-shadow: 0 0 0 3px rgba(78,143,255,0.18) !important;
    outline: none !important;
  }
  .form-control-custom::placeholder { color: #475569 !important; }

  .input-icon-wrap { position: relative; }
  .input-icon-wrap .bi {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: #475569;
    font-size: 1rem;
    pointer-events: none;
  }
  .input-icon-wrap .form-control-custom { padding-left: 2.5rem !important; }

  .btn-login {
    background: linear-gradient(135deg, #4e8fff, #1a5fa8);
    border: none;
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    border-radius: 10px;
    padding: 0.75rem;
    width: 100%;
    transition: all 0.25s ease;
    letter-spacing: 0.02em;
    margin-top: 0.5rem;
  }
  .btn-login:hover {
    background: linear-gradient(135deg, #6aa3ff, #4e8fff);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(78,143,255,0.35);
    color: #fff;
  }
  .btn-login:active { transform: translateY(0); }

  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    color: #64748b;
    font-size: 0.88rem;
  }
  .auth-footer a {
    color: #4e8fff;
    text-decoration: none;
    font-weight: 600;
  }
  .auth-footer a:hover { color: #6aa3ff; text-decoration: underline; }

  .divider {
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 1.4rem 0;
  }
</style>
{% endblock %}

{% block content %}
<!-- Override main-wrapper for full-height center -->
<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:1rem;">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <i class="bi bi-cloud-arrow-up-fill logo-icon"></i>
      <h1>CloudBackup System</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form method="POST" action="{{ url_for('login') }}" id="loginForm" novalidate>

      <div class="mb-3">
        <label class="form-label-custom" for="username">
          <i class="bi bi-person me-1"></i>Username
        </label>
        <div class="input-icon-wrap">
          <i class="bi bi-person"></i>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control form-control-custom"
            placeholder="Enter your username"
            autocomplete="username"
            required
          />
        </div>
      </div>

      <div class="mb-1">
        <label class="form-label-custom" for="password">
          <i class="bi bi-lock me-1"></i>Password
        </label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control form-control-custom"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
        </div>
      </div>

      <button type="submit" id="loginBtn" class="btn btn-login mt-4">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="divider"></div>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one now</a>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Subtle button loading state
  document.getElementById('loginForm').addEventListener('submit', function () {
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';
    btn.disabled = true;
  });
</script>
{% endblock %}
